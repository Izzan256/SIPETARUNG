; PlatformIO Project Configuration File
; Project: SIPETARUNG
; Target: NodeMCU v3 (ESP8266)
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = nodemcuv2
src_dir = src
include_dir = include
lib_dir = lib
test_dir = test

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino

; Serial Communication Settings
monitor_speed = 115200
upload_speed = 921600


; Build Output - Custom Firmware Naming
; Optimization
build_unflags = -Os
build_flags = 
  -D FIRMWARE_VERSION="1.0.0"
  -D FIRMWARE_NAME="SIPETARUNG"
  -D FIRMWARE_BUILD_TIMESTAMP=__TIMESTAMP__
  -O2

; Library Dependencies (uncomment as needed)
; lib_deps =
;   ArduinoJson
;   PubSubClient
;   ESP8266WiFi

; Advanced Settings
upload_resetmethod = nodemcu
monitor_filters = send_on_enter

